name: Update Market Board

on:
  schedule:
    # 04:50 JST is 19:50 UTC on the previous calendar day.
    - cron: "50 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-market-board:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update news
        run: python update_market_board.py --html-file index.html

      - name: Update charts
        run: node work/rebuild_popup_svg_charts.js

      - name: Commit updated board
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain index.html)" ]; then
            git add index.html
            git commit -m "Update market board"
            git push
          else
            echo "No changes to commit."
          fi
